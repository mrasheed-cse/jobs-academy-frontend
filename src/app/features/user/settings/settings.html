<div class="container py-5">
  <h2 class="fw-bold mb-4">সেটিংস</h2>
  <div class="row">
    <div class="col-lg-3 mb-4">
      <div class="settings-nav p-3">
        <a routerLink="/user/profile" class="settings-link"><i class="fas fa-user me-2"></i>প্রোফাইল</a>
        <a routerLink="/user/settings" class="settings-link active"><i class="fas fa-lock me-2"></i>নিরাপত্তা</a>
        <a routerLink="/user/performance" class="settings-link"><i class="fas fa-chart-bar me-2"></i>পারফরম্যান্স</a>
        <a routerLink="/subscription" class="settings-link"><i class="fas fa-crown me-2"></i>সাবস্ক্রিপশন</a>
        <hr>
        <button type="button" class="settings-link text-danger border-0 bg-transparent" (click)="logout()">
          <i class="fas fa-sign-out-alt me-2"></i>লগ আউট
        </button>
      </div>
    </div>
    <div class="col-lg-9">
      <div class="settings-card p-4 mb-4">
        <h5 class="fw-bold mb-4">পাসওয়ার্ড পরিবর্তন</h5>
        <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
          <div class="mb-3">
            <label class="form-label">বর্তমান পাসওয়ার্ড</label>
            <input type="password" class="form-control" formControlName="old_password">
          </div>
          <div class="mb-3">
            <label class="form-label">নতুন পাসওয়ার্ড</label>
            <input type="password" class="form-control" formControlName="new_password">
          </div>
          <div class="mb-3">
            <label class="form-label">নতুন পাসওয়ার্ড নিশ্চিত করুন</label>
            <input type="password" class="form-control" formControlName="confirm_password">
          </div>
          @if (saveSuccess()) { <div class="alert alert-success py-2">পাসওয়ার্ড পরিবর্তন হয়েছে।</div> }
          @if (saveError()) { <div class="alert alert-danger py-2">{{ saveError() }}</div> }
          <button type="submit" class="btn btn-primary" [disabled]="isSaving()">
            {{ isSaving() ? 'পরিবর্তন হচ্ছে…' : 'পরিবর্তন করুন' }}
          </button>
        </form>
      </div>

      <div class="settings-card p-4 border-danger">
        <h5 class="fw-bold text-danger mb-2">বিপদজনক অঞ্চল</h5>
        <p class="text-muted small mb-3">অ্যাকাউন্ট মুছে দিলে সব তথ্য চিরতরে হারিয়ে যাবে।</p>
        <a routerLink="/user/delete-account" class="btn btn-outline-danger btn-sm">অ্যাকাউন্ট মুছুন</a>
      </div>
    </div>
  </div>
</div>
