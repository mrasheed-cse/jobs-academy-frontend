<div class="page-bg">
  <div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="page-title">পূর্ববর্তী পরিক্ষাগুলি</h1>
      <div class="input-group border-bottom" style="width:300px">
        <input type="text" class="form-control border-0 text-center" placeholder="অনুসন্ধান করুন"
          [ngModel]="searchQuery()" (ngModelChange)="searchQuery.set($event)">
        <button class="btn btn-outline-secondary border-0" type="button"><i class="fas fa-search"></i></button>
      </div>
    </div>

    <div class="content-card">
      @if (isLoading()) {
        <div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
      } @else if (loadFailed()) {
        <p class="text-danger text-center py-4">লোড করতে ব্যর্থ হয়েছে।</p>
      } @else if (filtered().length === 0) {
        <p class="text-muted text-center py-4">কোনো সংস্থা পাওয়া যায়নি।</p>
      } @else {
        <div class="university-grid">
          @for (org of filtered(); track org.id) {
            <button type="button" class="university-link" (click)="openOrg(org.id)">
              <div class="university-card"><h6>{{ org.name }}</h6></div>
            </button>
          }
        </div>
      }
    </div>
  </div>
</div>
