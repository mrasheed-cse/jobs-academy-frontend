<div class="container py-5">
  <h2 class="fw-bold mb-4">সংবাদ বিভাগ</h2>
  @if (isLoading()) {
    <div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
  } @else if (categories().length === 0) {
    <p class="text-muted text-center py-5">কোনো বিভাগ পাওয়া যায়নি।</p>
  } @else {
    <div class="row">
      @for (cat of categories(); track cat.id) {
        <div class="col-6 col-md-4 col-lg-3 mb-4">
          <div class="category-card" (click)="openCategory(cat.id)" role="button">
            <i class="fas fa-newspaper fa-2x mb-3 text-primary d-block"></i>
            <h6 class="fw-bold">{{ cat.name }}</h6>
          </div>
        </div>
      }
    </div>
  }
</div>
